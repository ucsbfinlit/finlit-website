// ===== MY PORTFOLIO (Google Auth + Personal Holdings) =====
let currentUser=null;
let mpHoldings=[];
const MP_INITIAL=10000;

// Google Sign In
function googleSignIn(){
  if(typeof firebase==='undefined'||!firebase.auth){alert('Sign-in not available. Please disable tracking prevention or try another browser.');return;}
  const provider=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(e=>{
    console.error('Sign-in error:',e);
    alert('Sign-in failed. Please try again.');
  });
}
function googleSignOut(){
  if(typeof firebase==='undefined'||!firebase.auth)return;
  firebase.auth().signOut();
}

// Auth state listener
if(typeof firebase!=='undefined'&&firebase.auth){
firebase.auth().onAuthStateChanged(async user=>{
  currentUser=user;
  if(user){
    $('mp-signedout').classList.add('hidden');
    $('mp-signedin').classList.remove('hidden');
    $('mp-user-info').textContent=user.displayName+' · '+user.email;
    await mpLoad();
    await mpFetchPrices();
    await mpRender();
    // Listen for real-time updates to personal portfolio
    db.collection('portfolios').doc(user.uid).onSnapshot(async doc=>{
      if(doc.exists&&doc.data().holdings){
        try{mpHoldings=JSON.parse(doc.data().holdings);}catch(e){console.warn('Failed to parse personal holdings',e);return;}
        await mpRender();
      }
    });
  }else{
    $('mp-signedout').classList.remove('hidden');
    $('mp-signedin').classList.add('hidden');
    mpHoldings=[];
  }
});
} // end firebase auth check

// Load personal holdings from Firestore
async function mpLoad(){
  if(!currentUser)return;
  try{
    const doc=await db.collection('portfolios').doc(currentUser.uid).get();
    if(doc.exists&&doc.data().holdings){
      try{mpHoldings=JSON.parse(doc.data().holdings)||[];}catch(e){console.warn('Failed to parse personal holdings',e);mpHoldings=[];}
    }
  }catch(e){console.warn('Failed to load personal portfolio',e);}
}

// Save personal holdings to Firestore
async function mpSave(){
  if(!currentUser)return;
  try{
    await db.collection('portfolios').doc(currentUser.uid).set({
      holdings:JSON.stringify(mpHoldings),
      name:currentUser.displayName||'',
      email:currentUser.email||'',
      updated:new Date().toISOString()
    });
  }catch(e){console.error('Failed to save personal portfolio',e);}
}

// Add holding to personal portfolio
async function mpAddHolding(){
  if(!currentUser)return alert('Please sign in first.');
  const t=$('mp-add-ticker').value.trim().toUpperCase();
  const n=$('mp-add-name').value.trim()||t;
  const c=$('mp-add-cat').value;
  const sh=parseFloat($('mp-add-shares').value);
  const cb=parseFloat($('mp-add-cost').value);
  const dt=$('mp-add-date').value||new Date().toISOString().split('T')[0];
  if(!t||!sh||!cb)return alert('Please fill in ticker, shares, and cost basis.');
  const h={id:Date.now(),ticker:t,name:n,category:c,shares:sh,costBasis:cb,currentPrice:cb,datePurchased:dt};
  // Fetch live price
  const d=await fetchPrice(t);
  if(d&&d.c>0){h.currentPrice=d.c;h._dp=d.dp||0;h._h=d.h||0;h._l=d.l||0;h._o=d.o||0;h._pc=d.pc||0;}
  // Fetch beta, divYield, sector, name from Finnhub and cache in SI
  const mc=await fetchMetricsCached(t);
  if(mc){
    if(!SI[t])SI[t]={};
    if(mc.beta!=null)SI[t].beta=mc.beta;
    if(mc.divYield!=null)SI[t].divYield=mc.divYield;
    if(mc.sector)SI[t].sector=mc.sector;
    if(mc.name&&h.name===t)h.name=mc.name;
    if(!SI[t].desc)SI[t].desc=(mc.name||t)+(mc.sector?' · '+mc.sector:'');
  }
  mpHoldings.push(h);
  await mpSave();
  await mpRender();
  // Clear form
  $('mp-add-ticker').value='';$('mp-add-name').value='';$('mp-add-shares').value='';$('mp-add-cost').value='';$('mp-add-date').value='';
}

// Remove holding from personal portfolio
async function mpRemoveHolding(id){
  if(!confirm('Remove this position?'))return;
  mpHoldings=mpHoldings.filter(h=>h.id!==id);
  await mpSave();
  await mpRender();
}

// Fetch prices for personal holdings
async function mpFetchPrices(){
  for(const h of mpHoldings){
    const d=await fetchPrice(h.ticker);
    if(d&&d.c>0){h.currentPrice=d.c;h._dp=d.dp||0;h._h=d.h||0;h._l=d.l||0;h._o=d.o||0;h._pc=d.pc||0;}
    // Refresh metrics if missing (uses Firebase cache, so usually free)
    const si=SI[h.ticker]||{};
    if(si.beta==null||si.divYield==null){
      const mc=await fetchMetricsCached(h.ticker);
      if(mc){
        if(!SI[h.ticker])SI[h.ticker]={};
        if(mc.beta!=null)SI[h.ticker].beta=mc.beta;
        if(mc.divYield!=null)SI[h.ticker].divYield=mc.divYield;
        if(mc.sector)SI[h.ticker].sector=mc.sector;
        if(mc.name&&h.name===h.ticker)h.name=mc.name;
      }
    }
    await new Promise(r=>setTimeout(r,300));
  }
  if(mpHoldings.length>0)await mpSave();
}

// Calculate personal portfolio stats (reuses same logic)
function mpCalcStats(){
  const tv=mpHoldings.reduce((s,h)=>s+h.shares*h.currentPrice,0);
  const tc=mpHoldings.reduce((s,h)=>s+h.shares*h.costBasis,0);
  const cats={};
  for(const c of['index','alpha','fixed']){
    const ch=mpHoldings.filter(h=>h.category===c);
    const v=ch.reduce((s,h)=>s+h.shares*h.currentPrice,0);
    cats[c]={value:v,pct:tv>0?(v/tv)*100:0,holdings:ch};
  }
  return{tv,tc,gl:tv-tc,glPct:tc>0?((tv-tc)/tc)*100:0,cats,maxDrift:Math.max(...Object.keys(cats).map(c=>Math.abs(cats[c].pct-TARGETS[c])),0)};
}

// Render personal portfolio
async function mpRender(){
  if(!currentUser)return;
  const s=mpCalcStats();

  // Empty state
  if(mpHoldings.length===0){
    $('mp-empty').classList.remove('hidden');
    $('mp-stats').innerHTML='';
    $('mp-risk-metrics').innerHTML='';
    $('mp-pie-chart').style.background='var(--light-gray)';
    $('mp-pie-chart').style.boxShadow='inset 0 0 0 36px #FFFFFF';
    $('mp-pie-legend').innerHTML='';
    $('mp-alloc-bars').innerHTML='';
    $('mp-sector-bars').innerHTML='';
    $('mp-holdings-tbody').innerHTML='';
    return;
  }
  $('mp-empty').classList.add('hidden');

  // Stats
  const roi=s.tc>0?((s.tv-s.tc)/s.tc*100):0;
  $('mp-stats').innerHTML=`<div class="card"><div class="stat-label"><span class="tip">Cost Basis<span class="tip-i">?</span><span class="tip-box">The total you spent to buy all your positions (shares x cost per share). Compare this to current value to see if you are up or down overall.</span></span></div><div class="stat-value">${fmt(s.tc)}</div></div><div class="card"><div class="stat-label"><span class="tip">Current Value<span class="tip-i">?</span><span class="tip-box">What your entire portfolio is worth right now at live market prices. This fluctuates — that is volatility, and it is normal. What matters is the long-term trend.</span></span></div><div class="stat-value">${fmt(s.tv)}</div></div><div class="card"><div class="stat-label"><span class="tip">Gain/Loss<span class="tip-i">?</span><span class="tip-box">Current value minus cost basis. Green = profit, red = loss. Remember: prices fluctuate but the market trends upward over time. Patience is how you make money.</span></span></div><div class="stat-value" style="color:${s.gl>=0?'var(--green-cat)':'var(--red)'}">${fmt(s.gl)}<br><span style="font-size:13px">${fmtPct(s.glPct)}</span></div></div><div class="card"><div class="stat-label">Holdings</div><div class="stat-value">${mpHoldings.length}</div></div><div class="card"><div class="stat-label"><span class="tip">Max Drift<span class="tip-i">?</span><span class="tip-box">How far your allocation has drifted from the 60/30/10 target. Over 5% means you should rebalance — sell some of what is overweight and buy what is underweight to get back on target.</span></span></div><div class="stat-value" style="color:${s.maxDrift>5?'var(--red)':s.maxDrift>2?'var(--yellow-cat)':'var(--green-cat)'}">${s.maxDrift.toFixed(1)}%</div></div>`;

  // Fetch missing beta/divYield for any ticker not yet in SI
  const missingTickers=[...new Set(mpHoldings.map(h=>h.ticker).filter(t=>!SI[t]||SI[t].beta==null||SI[t].divYield==null))];
  if(missingTickers.length>0){
    $('mp-risk-metrics').innerHTML='<div style="color:var(--text-muted);font-size:13px;padding:12px 0">Fetching risk data…</div>';
    await Promise.all(missingTickers.map(async t=>{
      const mc=await fetchMetricsCached(t);
      if(mc){
        if(!SI[t])SI[t]={};
        if(mc.beta!=null)SI[t].beta=mc.beta;
        if(mc.divYield!=null)SI[t].divYield=mc.divYield;
        if(mc.sector)SI[t].sector=mc.sector;
      }
    }));
  }

  // Risk metrics
  let wBeta=0,wYield=0,totalVal=s.tv||1;
  mpHoldings.forEach(h=>{
    const v=h.shares*h.currentPrice;
    const info=SI[h.ticker]||{};
    wBeta+=(v/totalVal)*(info.beta!=null?info.beta:1.0);
    wYield+=(v/totalVal)*(info.divYield!=null?info.divYield:0);
  });
  // Check if any tickers still have no beta data (Finnhub failed)
  const unavailable=mpHoldings.filter(h=>!SI[h.ticker]||SI[h.ticker].beta==null).map(h=>h.ticker);
  const riskFree=4.5;const portReturn=s.glPct||0;const estVol=wBeta*15;
  const sharpe=estVol>0?(portReturn-riskFree)/estVol:0;
  const maxHolding=mpHoldings.length>0?Math.max(...mpHoldings.map(h=>(h.shares*h.currentPrice/totalVal)*100)):0;
  const sharpeColor=sharpe>=1?'var(--green-cat)':sharpe>=0.5?'var(--yellow-cat)':'var(--red)';
  const betaColor=wBeta>1.2?'var(--red)':wBeta>0.8?'var(--yellow-cat)':'var(--green-cat)';
  const concColor=maxHolding>40?'var(--red)':maxHolding>25?'var(--yellow-cat)':'var(--green-cat)';
  // Remove any previous warning banners before potentially adding a new one
  const existingWarn=document.getElementById('mp-risk-warning');
  if(existingWarn)existingWarn.remove();
  if(unavailable.length>0){
    $('mp-risk-metrics').insertAdjacentHTML('beforebegin',`<div id="mp-risk-warning" style="background:var(--warm-gray);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text-muted);"><b style="color:var(--text-secondary);">⚠ Risk data unavailable for: ${unavailable.join(', ')}</b> — Beta defaults to 1.0, yield to 0%. Try refreshing prices later, or the API may be rate-limited.</div>`);
  }
  $('mp-risk-metrics').innerHTML=`<div class="card"><div class="stat-label"><span class="tip">Sharpe Ratio<span class="tip-i">?</span><span class="tip-box">How much return are you getting per unit of risk? Above 1.0 means you are being well-compensated for the volatility. Below 0.5 means the risk may not be worth it.</span></span></div><div class="stat-value" style="color:${sharpeColor}">${sharpe.toFixed(2)}</div><div class="stat-sub">Risk-adjusted return</div></div><div class="card"><div class="stat-label"><span class="tip">Portfolio Beta<span class="tip-i">?</span><span class="tip-box">How much does your portfolio go up and down vs the S&amp;P 500? 1.0 = same volatility as the market. Below 1.0 = less risky. Above 1.0 = more volatile. Risk is neither bad nor good — just something to be aware of.</span></span></div><div class="stat-value" style="color:${betaColor}">${wBeta.toFixed(2)}</div><div class="stat-sub">vs S&P 500</div></div><div class="card"><div class="stat-label"><span class="tip">Wtd Avg Yield<span class="tip-i">?</span><span class="tip-box">The blended dividend yield across your holdings. Dividends are cash payments companies make to shareholders — a stable source of returns. Dividend per share divided by stock price, weighted by how much you own of each.</span></span></div><div class="stat-value">${wYield.toFixed(2)}%</div><div class="stat-sub">Blended dividend</div></div><div class="card"><div class="stat-label"><span class="tip">Concentration<span class="tip-i">?</span><span class="tip-box">How much of your portfolio is in a single position. High concentration = less diversification = more risk from one holding. Spreading investments across assets reduces the impact of any single one doing poorly.</span></span></div><div class="stat-value" style="color:${concColor}">${maxHolding.toFixed(1)}%</div><div class="stat-sub">Top holding weight</div></div>`;

  // Pie chart
  const pd=Object.keys(CM).map(c=>({c,pct:s.cats[c].pct,color:CM[c].color}));
  $('mp-pie-chart').style.background=`conic-gradient(${pd.map((d,i)=>{const st=pd.slice(0,i).reduce((a,x)=>a+x.pct,0);return`${d.color} ${st}% ${st+d.pct}%`;}).join(',')})`;
  $('mp-pie-chart').style.boxShadow='inset 0 0 0 36px #FFFFFF';
  $('mp-pie-legend').innerHTML=pd.map(d=>`<div class="pie-legend-item"><div class="pie-dot" style="background:${d.color}"></div>${CM[d.c].label.split('/')[0].trim()} ${d.pct.toFixed(1)}%</div>`).join('');

  // Allocation bars
  $('mp-alloc-bars').innerHTML=Object.keys(CM).map(c=>{const p=s.cats[c].pct,t=TARGETS[c],dr=p-t,dc=Math.abs(dr)>5?'var(--red)':Math.abs(dr)>2?'var(--yellow-cat)':'var(--green-cat)';return`<div style="margin-bottom:20px;"><div style="display:flex;justify-content:space-between;"><span class="badge ${CM[c].badge}">${CM[c].label}</span><span style="font-size:12px;"><span style="color:${dc};font-weight:600;">${p.toFixed(1)}%</span><span style="color:var(--muted)">/${t}%</span></span></div><div class="alloc-bar-track"><div class="alloc-bar-fill" style="width:${Math.min(p,100)}%;background:${CM[c].color}"></div><div class="alloc-marker" style="left:${t}%"></div></div></div>`;}).join('');

  // Sector bars
  const sectors={};
  mpHoldings.forEach(h=>{
    const info=SI[h.ticker]||{sector:'Other'};
    const sec=info.sector||'Other';
    const v=h.shares*h.currentPrice;
    if(!sectors[sec])sectors[sec]={value:0,tickers:[]};
    sectors[sec].value+=v;
    sectors[sec].tickers.push(h.ticker);
  });
  const sectorArr=Object.entries(sectors).map(([name,d])=>({name,value:d.value,pct:s.tv>0?(d.value/s.tv)*100:0,tickers:d.tickers})).sort((a,b)=>b.pct-a.pct);
  const sectorColors=['#0056B3','#0D7D4D','#B7791F','#C53030','#6B46C1','#C05621','#2B6CB0','#B83280'];
  $('mp-sector-bars').innerHTML=sectorArr.map((sec,i)=>{
    const c=sectorColors[i%sectorColors.length];
    return`<div style="margin-bottom:14px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="font-size:13px;font-weight:600;color:var(--text-primary)">${sec.name}</span><span style="font-size:12px;color:var(--muted)">${sec.pct.toFixed(1)}% · ${sec.tickers.join(', ')}</span></div><div class="alloc-bar-track"><div class="alloc-bar-fill" style="width:${Math.min(sec.pct,100)}%;background:${c}"></div></div></div>`;
  }).join('');

  // Holdings table
  $('mp-holdings-tbody').innerHTML=mpHoldings.map(h=>{
    const v=h.shares*h.currentPrice,gl=v-h.shares*h.costBasis,gp=h.costBasis>0?((h.currentPrice-h.costBasis)/h.costBasis)*100:0,pp=s.tv>0?(v/s.tv)*100:0,dc=h._dp||0,info=SI[h.ticker]||{sector:'—',beta:1.0};
    return`<tr><td class="mono" style="font-weight:600;color:var(--text-primary)">${h.ticker}</td><td style="color:var(--text-secondary);font-size:12px">${h.name}</td><td><span class="badge ${CM[h.category]?.badge||''}">${h.category}</span></td><td style="font-size:11px;color:var(--muted)">${info.sector||'—'}</td><td class="text-right mono">${h.shares}</td><td class="text-right mono">${fmt(h.costBasis)}</td><td class="text-right"><span class="mono">${fmt(h.currentPrice)}</span>${dc?`<br><span style="font-size:10px;color:${dc>=0?'var(--green-cat)':'var(--red)'}">${fmtPct(dc)}</span>`:''}</td><td class="text-right mono" style="font-weight:600;color:var(--text-primary)">${fmt(v)}</td><td class="text-right mono" style="color:${gl>=0?'var(--green-cat)':'var(--red)'}">${fmt(gl)}<br><span style="font-size:10px">${fmtPct(gp)}</span></td><td class="text-right mono" style="font-size:11px">${(info.beta||1.0).toFixed(2)}</td><td class="text-right mono" style="font-size:11px">${pp.toFixed(1)}%</td><td class="text-right"><button class="btn-danger" onclick="mpRemoveHolding(${h.id})" style="font-size:10px;padding:4px 8px;">Remove</button></td></tr>`;
  }).join('');
}

// ===== INIT =====
(async function(){
  await loadAll();
  await loadSiteContent();
  if(isEditor)enableEditor();
  // Apply fallback prices if first load
  if(!holdings.some(h=>h.currentPrice>0)){const fb={VOO:636.35,CAT:768.23,LMT:489.55,BND:72.88};holdings.forEach(h=>{if(fb[h.ticker])h.currentPrice=fb[h.ticker];});}
  renderAll();
  fetchAllPrices();
  listenForUpdates();
  updateOfficerUI();
})();
</script>
</body>
</html>
